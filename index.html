<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston Sports Hub - Wicked Smart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Actual Picture of Boston Skyline */
            background: url('https://images.unsplash.com/photo-1506501139174-099022df5260?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            font-family: "Apple Chancery", "Segoe Script", "Brush Script MT", cursive;
            text-align: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Overlay to make text and buttons pop against the photo */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        #container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 90%;
        }

        h1 {
            font-size: 3.5rem;
            color: #1a1a1a;
            margin-bottom: 30px;
            text-shadow: 1px 1px 0px #fff;
        }

        .sport-btn {
            padding: 15px 30px;
            font-size: 1.4rem;
            font-family: inherit;
            cursor: pointer;
            border: 3px solid #fff;
            border-radius: 12px;
            color: white;
            margin: 10px;
            position: relative;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: visible;
        }

        .sport-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* Original Main Button */
        #main-btn { background-color: #002244; }

        /* Team Colors & Symbols */
        #celtics-btn { background-color: #008348; }
        #celtics-btn::before { content: "🏳️"; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; filter: drop-shadow(0 0 5px gold); }

        #patriots-btn { background-color: #002244; }
        #patriots-btn::before { content: "🚨"; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 2rem; }

        #redsox-btn { background-color: #BD3039; }
        #redsox-btn::before { content: "▲"; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 2rem; color: #fff; }

        #bruins-btn { background-color: #FFB81C; color: #000; border-color: #000; }
        #bruins-btn::before { content: "⚙️"; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; }

        #revol-btn { background-color: #002D62; }
        #revol-btn::before { content: "⚽"; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; }

        #sports-options {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Flying Lobster Animation */
        .lobster {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="container">
        <h1 id="main-text">Welcome to the Hub</h1>
        <button id="main-btn" class="sport-btn">Home of the Champions</button>

        <div id="sports-options">
            <button id="celtics-btn" class="sport-btn" onclick="celebrate('Celtics')">Celtics</button>
            <button id="patriots-btn" class="sport-btn" onclick="celebrate('Patriots')">Patriots</button>
            <button id="redsox-btn" class="sport-btn" onclick="celebrate('Red Sox')">Red Sox</button>
            <button id="bruins-btn" class="sport-btn" onclick="celebrate('Bruins')">Bruins</button>
            <button id="revol-btn" class="sport-btn" onclick="celebrate('Revolution')">Revolution</button>
        </div>
    </div>

    <script>
        const mainBtn = document.getElementById('main-btn');
        const mainText = document.getElementById('main-text');
        const sportsOptions = document.getElementById('sports-options');

        mainBtn.addEventListener('click', () => {
            // Random Tint Color for the background overlay
            const colors = ['rgba(255,182,193,0.4)', 'rgba(152,251,152,0.4)', 'rgba(255,215,0,0.4)', 'rgba(135,206,250,0.4)'];
            document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

            mainText.innerText = "Pick your favorite team!";
            mainBtn.style.display = 'none';
            sportsOptions.style.display = 'flex';
        });

        function celebrate(team) {
            mainText.innerHTML = `${team} Fans Are<br>Wicked Smart!`;
            
            // Create flying lobsters
            for (let i = 0; i < 40; i++) {
                createLobster();
            }
        }

        function createLobster() {
            const lobster = document.createElement('div');
            lobster.className = 'lobster';
            lobster.innerText = '🦞';
            
            lobster.style.left = '50%';
            lobster.style.top = '50%';
            
            const x = (Math.random() - 0.5) * window.innerWidth * 1.8;
            const y = (Math.random() - 0.5) * window.innerHeight * 1.8;
            
            lobster.style.setProperty('--x', `${x}px`);
            lobster.style.setProperty('--y', `${y}px`);
            
            lobster.style.animation = `fly ${Math.random() * 2 + 1}s forwards ease-out`;
            
            document.body.appendChild(lobster);
            setTimeout(() => lobster.remove(), 3000);
        }
    </script>
</body>
</html>
