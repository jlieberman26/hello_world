<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston Sports Hub - Wicked Smart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Cartoon Skyline Background (CSS Gradient & Shapes) */
            background-color: #87CEEB; /* Sky Blue */
            background-image: 
                linear-gradient(to bottom, transparent 60%, #444 60%, #444 100%), /* Ground/City base */
                linear-gradient(to bottom, rgba(135, 206, 235, 0) 0%, rgba(135, 206, 235, 1) 100%), /* Fade to sky */
                /* Buildings (simple rects) */
                linear-gradient(to bottom, #555 0%, #555 100%),
                linear-gradient(to bottom, #666 0%, #666 100%),
                linear-gradient(to bottom, #777 0%, #777 100%);
            background-repeat: no-repeat;
            background-size: 100% 100%, 100% 40%, 5% 50%, 10% 60%, 8% 40%;
            background-position: 0 0, 0 60%, 10% 10%, 25% -20%, 80% 20%;
            
            font-family: "Apple Chancery", "Segoe Script", "Brush Script MT", cursive;
            text-align: center;
            overflow: hidden; /* Hide flying crabs initially */
            transition: background-color 0.5s ease;
        }

        /* The container keeps elements together but doesn't block background */
        #container {
            z-index: 10;
            position: relative; /* Context for children */
        }

        h1 {
            font-size: 3.5rem;
            color: #333;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* --- Buttons - Team Colors & Historical Symbols --- */
        .sport-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            border: 4px solid #fff; /* White border to pop */
            border-radius: 15px;
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            margin: 10px;
            position: relative;
            box-shadow: 0 6px 10px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden; /* For symbols */
        }

        .sport-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }

        /* "Home of the Champions" button - Blue/Red */
        #main-btn {
            background-color: #002244; /* Patriots Blue */
            display: inline-block; /* Show initially */
        }
        #main-btn:after { /* Patriots Logo hint */
            content: "★";
            position: absolute;
            font-size: 3rem;
            opacity: 0.2;
            right: 10px;
            bottom: -5px;
        }

        /* Celtics - Green */
        #celtics-btn {
            background-color: #008348;
            display: none;
        }
        #celtics-btn:before { /* Championship Banners (Multiple) */
            content: "🏆 🏆 🏆 🏆"; /* Simple representations */
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.3;
            top: 5px;
            left: 10px;
            display: flex;
            gap: 5px;
        }

        /* Patriots - Blue with Lighthouse */
        #patriots-btn {
            background-color: #002244;
            display: none;
        }
        #patriots-btn:after { /* Lighthouse Symbol */
            content: "⚓"; /* Standing in for a lighthouse shape in basic unicode */
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.4;
            left: 15px;
            top: 5px;
        }

        /* Red Sox - Red with Citgo sign */
        #redsox-btn {
            background-color: #BD3039;
            display: none;
        }
        #redsox-btn:after { /* The 'Citgo' sign - text based and triangle */
            content: "▲ CITGO";
            position: absolute;
            color: #fff;
            background: #BD3039; /* matches button */
            padding: 2px 5px;
            font-size: 0.7rem;
            opacity: 0.7;
            font-family: sans-serif;
            top: 5px;
            right: 10px;
            border: 1px solid white;
        }


        #sports-options {
            margin-top: 20px;
            display: none;
            gap: 15px;
            justify-content: center;
        }

        /* --- Flying Crabs ('Firework' replacement) --- */
        .crab-particle {
            position: fixed;
            font-size: 2.5rem;
            pointer-events: none;
            z-index: 5;
            user-select: none;
            opacity: 0;
            animation: crabFly 3s ease-out forwards;
        }

        @keyframes crabFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(var(--tr));
                opacity: 0;
            }
        }

    </style>
</head>
<body>

    <div id="container">
        <h1 id="main-text">Welcome to the Hub</h1>
        <button id="main-btn" class="sport-btn">HOME OF THE CHAMPIONS</button>

        <div id="sports-options">
            <button id="celtics-btn" class="sport-btn" onclick="celebrate('Celtics')">Celtics</button>
            <button id="patriots-btn" class="sport-btn" onclick="celebrate('Patriots')">Patriots</button>
            <button id="redsox-btn" class="sport-btn" onclick="celebrate('Red Sox')">Red Sox</button>
        </div>
    </div>

    <script>
        const mainBtn = document.getElementById('main-btn');
        const mainText = document.getElementById('main-text');
        const sportsOptions = document.getElementById('sports-options');

        const funPhrases = [
            "Pick your champion!",
            "The City of Champions awaits...",
            "Which legend do you follow?",
            "Wicked awesome choice coming up!"
        ];

        // 1. Handle Main Button Click
        mainBtn.addEventListener('click', () => {
            // Random Background Color (Cool tone)
            const randomHue = Math.random() * 60 + 180; // Cool colors (180-240)
            document.body.style.backgroundColor = `hsl(${randomHue}, 60%, 75%)`;

            // Update Text
            const randomPhrase = funPhrases[Math.floor(Math.random() * funPhrases.length)];
            mainText.innerText = randomPhrase;

            // Transition: Hide self, show others
            mainBtn.style.display = 'none';
            sportsOptions.style.display = 'flex';
        });

        // 2. Handle Team Selection (Celebration)
        function celebrate(team) {
            // New Text - MUST say "Wicked Smart"
            mainText.innerHTML = `${team} Fans are<br>Wicked Smart!`;
            
            // Trigger Crabs Celebration
            spawnCrabs();
        }

        // 3. Flying Crabs System
        function spawnCrabs() {
            const numCrabs = 50;
            for (let i = 0; i < numCrabs; i++) {
                const crab = document.createElement('div');
                crab.className = 'crab-particle';
                crab.innerText = '🦀'; // The Crab emoji

                // Set initial position (from center)
                const startX = window.innerWidth / 2;
                const startY = window.innerHeight / 2;
                crab.style.left = `${startX}px`;
                crab.style.top = `${startY}px`;

                // Set random flight trajectory (using CSS variables)
                // Fly outwards, 360 degrees
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 600 + 200; // random flight distance
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const tr = (Math.random() - 0.5) * 720; // random spin (2 rotations)

                crab.style.setProperty('--tx', `${tx}px`);
                crab.style.setProperty('--ty', `${ty}px`);
                crab.style.setProperty('--tr', `${tr}deg`);

                // random size slightly
                crab.style.fontSize = `${Math.random() * 1.5 + 1.5}rem`;

                document.body.appendChild(crab);

                // Clean up the DOM element after animation
                setTimeout(() => {
                    crab.remove();
                }, 3000); // matches animation duration
            }
        }
    </script>
</body>
</html>
