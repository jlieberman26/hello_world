<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston Sports Hub - Wicked Smart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Cartoon Skyline Background */
            background: #87CEEB; /* Sky color */
            background-image: 
                /* Buildings */
                linear-gradient(to top, #2c3e50 30%, transparent 30.5%),
                linear-gradient(90deg, transparent 5%, #34495e 5%, #34495e 15%, transparent 15%, transparent 20%, #2c3e50 20%, #2c3e50 35%, transparent 35%, transparent 40%, #34495e 40%, #34495e 55%, transparent 55%, transparent 70%, #2c3e50 70%, #2c3e50 85%, transparent 85%),
                /* Distant Buildings */
                linear-gradient(90deg, transparent 10%, #7f8c8d 10%, #7f8c8d 20%, transparent 20%, transparent 50%, #95a5a6 50%, #95a5a6 65%, transparent 65%);
            background-size: 100% 100%, 100% 100%, 100% 100%;
            font-family: "Apple Chancery", "Segoe Script", "Brush Script MT", cursive;
            text-align: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        #container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 3.5rem;
            color: #1a1a1a;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0px #fff;
        }

        /* Standard Button Styling */
        .sport-btn {
            padding: 20px 40px;
            font-size: 1.6rem;
            font-family: inherit;
            cursor: pointer;
            border: 4px solid #fff;
            border-radius: 15px;
            color: white;
            margin: 15px;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            overflow: visible; /* To show symbols clearly */
        }

        .sport-btn:hover {
            transform: scale(1.1);
        }

        /* Initial Button */
        #main-btn {
            background-color: #002244;
        }

        /* Team Specific Buttons */
        #celtics-btn { 
            background-color: #008348; 
        }
        /* Championship Banners */
        #celtics-btn::before {
            content: "🏳️🏳️🏳️";
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            filter: sepia(1) saturate(5);
        }

        #patriots-btn { 
            background-color: #002244; 
        }
        /* Lighthouse */
        #patriots-btn::before {
            content: "🚨";
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
        }

        #redsox-btn { 
            background-color: #BD3039; 
        }
        /* Citgo Sign (Triangle) */
        #redsox-btn::before {
            content: "▲";
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }

        #sports-options {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Flying Crab Animation */
        .crab {
            position: fixed;
            font-size: 2.5rem;
            pointer-events: none;
            z-index: 100;
            user-select: none;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="container">
        <h1 id="main-text">Welcome to the Hub</h1>
        <button id="main-btn" class="sport-btn">Home of the Champions</button>

        <div id="sports-options">
            <button id="celtics-btn" class="sport-btn" onclick="celebrate('Celtics')">Celtics</button>
            <button id="patriots-btn" class="sport-btn" onclick="celebrate('Patriots')">Patriots</button>
            <button id="redsox-btn" class="sport-btn" onclick="celebrate('Red Sox')">Red Sox</button>
        </div>
    </div>

    <script>
        const mainBtn = document.getElementById('main-btn');
        const mainText = document.getElementById('main-text');
        const sportsOptions = document.getElementById('sports-options');

        // Initial Click Logic
        mainBtn.addEventListener('click', () => {
            // Random Background Color change
            const colors = ['#FFB6C1', '#98FB98', '#FFD700', '#E6E6FA', '#87CEFA'];
            document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

            // Change Text
            mainText.innerText = "Pick your favorite team!";

            // Swap Buttons
            mainBtn.style.display = 'none';
            sportsOptions.style.display = 'flex';
        });

        // Team Click Logic
        function celebrate(team) {
            mainText.innerHTML = `${team} Fans Are<br>Wicked Smart!`;
            
            // Create flying crabs
            for (let i = 0; i < 30; i++) {
                createCrab();
            }
        }

        function createCrab() {
            const crab = document.createElement('div');
            crab.className = 'crab';
            crab.innerText = '🦀';
            
            // Start from the middle
            crab.style.left = '50%';
            crab.style.top = '50%';
            
            // Set random travel distance
            const x = (Math.random() - 0.5) * window.innerWidth * 1.5;
            const y = (Math.random() - 0.5) * window.innerHeight * 1.5;
            
            crab.style.setProperty('--x', `${x}px`);
            crab.style.setProperty('--y', `${y}px`);
            
            crab.style.animation = `fly ${Math.random() * 2 + 1}s forwards ease-out`;
            
            document.body.appendChild(crab);
            
            // Remove after animation
            setTimeout(() => crab.remove(), 3000);
        }
    </script>
</body>
</html>
