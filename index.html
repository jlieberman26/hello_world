<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston Sports Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue base */
            font-family: 'Brush Script MT', cursive; /* Basic cursive font */
        }

        /* 1. Cartoon Skyline Background */
        body::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            /* Simplified cartoon skyline using layered gradients */
            background:
                /* Building 1 (Dark Grey) */
                linear-gradient(to right, #333 10px, transparent 10px) 50px 0,
                linear-gradient(#333, #333) 50px 0 / 40px 100px,
                /* Building 2 (Red Brick) */
                linear-gradient(to right, #B22222 10px, transparent 10px) 100px 20px,
                linear-gradient(#B22222, #B22222) 100px 20px / 60px 80px,
                /* Building 3 (Glass Tower - Lighter Grey) */
                linear-gradient(to right, #555 10px, transparent 10px) 180px -20px,
                linear-gradient(#555, #555) 180px -20px / 30px 120px,
                /* Building 4 (Short Brick) */
                linear-gradient(to right, #A0522D 10px, transparent 10px) 230px 40px,
                linear-gradient(#A0522D, #A0522D) 230px 40px / 50px 60px;
            background-repeat: repeat-x;
            z-index: -1;
            filter: drop-shadow(0 -5px 5px rgba(0,0,0,0.2));
        }

        #app {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        /* 2. Style text to be cursive */
        #dynamic-text {
            color: #ffd700; /* Gold */
            text-shadow: 1px 1px 2px #000;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-family: 'Brush Script MT', cursive;
            transition: background-color 0.3s, transform 0.1s;
        }

        /* Standard Start Button */
        #start-btn {
            background-color: #f44336; /* Red */
            color: white;
        }

        #start-btn:hover {
            background-color: #d32f2f;
        }

        /* Themed Team Buttons */
        #options-container {
            display: none;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .team-btn {
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .team-btn:active {
            transform: translateY(2px);
        }

        /* Add Team Symbols (Simplified Pseudo-elements) */
        /* 3. Team colors and historical symbols */
        
        /* Red Sox: Red, Citgo Sign (Simplified Triangle) */
        #sox-btn {
            background-color: #BD3039;
        }
        #sox-btn::after {
            content: "▲"; /* Simple Citgo Triangle shape */
            color: #C60C30;
            font-size: 2rem;
            position: absolute;
            opacity: 0.3;
            top: -10px;
            right: 5px;
        }

        /* Celtics: Green, Leprechaun Hat (Simplified Shape) */
        #celtics-btn {
            background-color: #008348;
        }
        #celtics-btn::after {
            content: "🎩"; /* Top Hat emoji for simple symbol */
            font-size: 1.5rem;
            position: absolute;
            opacity: 0.3;
            bottom: -5px;
            left: 5px;
        }

        /* Patriots: Blue, Minute Man Tricorne (Simplified Shape) */
        #patriots-btn {
            background-color: #002244;
        }
        #patriots-btn::after {
            content: "🧢"; /* Billed cap emoji, closest simple shape */
            font-size: 1.5rem;
            position: absolute;
            opacity: 0.3;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 4. Flying Crabs Container */
        #crab-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 100;
        }

        .crab {
            position: absolute;
            font-size: 2rem;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>Welcome!</h1>
        <h2 id="dynamic-text">Ready for more info?</h2>
        <button id="start-btn">Click Me for More Information</button>

        <div id="options-container">
            <button id="sox-btn" class="team-btn" onclick="celebrate('Red Sox')">Red Sox</button>
            <button id="celtics-btn" class="team-btn" onclick="celebrate('Celtics')">Celtics</button>
            <button id="patriots-btn" class="team-btn" onclick="celebrate('Patriots')">Patriots</button>
        </div>
    </div>

    <div id="crab-container"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const dynamicText = document.getElementById('dynamic-text');
        const optionsContainer = document.getElementById('options-container');
        const crabContainer = document.getElementById('crab-container');

        const phrases = [
            "What's your favorite crew?",
            "Which team runs this town?",
            "Choose your legend!",
            "You got a favorite?"
        ];

        startBtn.addEventListener('click', () => {
            // Random Background Color
            const randomColor = `hsl(${Math.random() * 360}, 60%, 80%)`;
            document.body.style.backgroundColor = randomColor;

            // Update Text
            dynamicText.innerText = phrases[Math.floor(Math.random() * phrases.length)];

            // Swap Buttons
            startBtn.style.display = 'none';
            optionsContainer.style.display = 'flex';
        });

        // 5. Text updates to "Wicked Smart" and flying crabs
        function celebrate(teamName) {
            // Update the text
            dynamicText.innerText = `You chose the ${teamName}. Wicked Smart!`;
            
            // Trigger flying crabs
            flyCrabs();
        }

        function flyCrabs() {
            // Clear previous crabs if any
            crabContainer.innerHTML = '';
            crabContainer.style.display = 'block';

            const crabCount = 30;

            for (let i = 0; i < crabCount; i++) {
                const crab = document.createElement('div');
                crab.className = 'crab';
                crab.innerText = '🦀'; // The crab emoji

                // Random starting positions near center
                const startX = window.innerWidth / 2 + (Math.random() * 100 - 50);
                const startY = window.innerHeight / 2 + (Math.random() * 100 - 50);
                crab.style.left = startX + 'px';
                crab.style.top = startY + 'px';

                // Random end positions (flying off-screen)
                const endX = (Math.random() * 2 - 1) * window.innerWidth * 1.5; // Fly far left or right
                const endY = (Math.random() * -1.5) * window.innerHeight; // Fly up

                // Animation parameters
                const duration = Math.random() * 2 + 1; // 1 to 3 seconds

                // Apply simple Javascript animation using CSS transitions/transforms
                // Since this needs to be self-contained JS, we append keyframes dynamically or use timers.
                // Dynamic CSS rule addition is cleaner here.
                const keyframeName = `flyCrab${i}`;
                const keyframes = `
                    @keyframes ${keyframeName} {
                        to {
                            transform: translate(${endX}px, ${endY}px) rotate(${Math.random() * 720}deg);
                            opacity: 0;
                        }
                    }
                `;
                const styleSheet = document.styleSheets[0];
                styleSheet.insertRule(keyframes, styleSheet.cssRules.length);

                crab.style.animation = `${keyframeName} ${duration}s ease-out forwards`;

                crabContainer.appendChild(crab);
            }

            // Hide the container after animations finish
            setTimeout(() => {
                crabContainer.style.display = 'none';
            }, 3000); // Wait for the longest duration
        }
    </script>
</body>
</html>
